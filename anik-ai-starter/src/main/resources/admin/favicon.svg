<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0f0a1e" stroke="url(#glow)" stroke-width="1.5"/>
  <!-- Neural network connections -->
  <g stroke="url(#glow)" stroke-width="1" opacity="0.5" filter="url(#blur)">
    <line x1="50" y1="50" x2="25" y2="30"/>
    <line x1="50" y1="50" x2="75" y2="30"/>
    <line x1="50" y1="50" x2="20" y2="55"/>
    <line x1="50" y1="50" x2="80" y2="55"/>
    <line x1="50" y1="50" x2="30" y2="75"/>
    <line x1="50" y1="50" x2="70" y2="75"/>
    <line x1="25" y1="30" x2="75" y2="30"/>
    <line x1="20" y1="55" x2="30" y2="75"/>
    <line x1="80" y1="55" x2="70" y2="75"/>
  </g>
  <!-- Outer nodes -->
  <circle cx="25" cy="30" r="5" fill="url(#glow)" filter="url(#blur)"/>
  <circle cx="75" cy="30" r="5" fill="url(#glow)" filter="url(#blur)"/>
  <circle cx="20" cy="55" r="5" fill="url(#glow)" filter="url(#blur)"/>
  <circle cx="80" cy="55" r="5" fill="url(#glow)" filter="url(#blur)"/>
  <circle cx="30" cy="75" r="5" fill="url(#glow)" filter="url(#blur)"/>
  <circle cx="70" cy="75" r="5" fill="url(#glow)" filter="url(#blur)"/>
  <!-- Center node (bright) -->
  <circle cx="50" cy="50" r="8" fill="url(#glow)" filter="url(#blur)" opacity="0.9"/>
  <circle cx="50" cy="50" r="5" fill="#ffffff" opacity="0.95"/>
</svg>
